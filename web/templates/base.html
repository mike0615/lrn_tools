<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site_name }} Admin{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body data-tool-id="{{ request.view_args.get('tool_id', '') if request.view_args else '' }}"
      data-page="{{ request.endpoint or '' }}">

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">&#9650; LRN Tools</div>
        <div class="site-name">{{ site_name }}</div>
      </div>

      <nav class="nav">
        <a href="{{ url_for('index') }}" class="nav-home {% if request.endpoint == 'index' %}active{% endif %}">
          &#8962; Dashboard
        </a>
        {% for cat in categories %}
        <div class="nav-category">
          <span class="cat-label">{{ cat }}</span>
          {% for tool in tools_by_cat[cat] %}
          <a href="{{ url_for('tool_page', tool_id=tool.id) }}"
             class="nav-tool {% if request.view_args and request.view_args.get('tool_id') == tool.id %}active{% endif %}">
            {{ tool.name }}
          </a>
          {% endfor %}
        </div>
        {% endfor %}
      </nav>
    </aside>

    <!-- Main content -->
    <main class="main">
      <div class="topbar">
        <span class="topbar-title">{% block page_title %}Dashboard{% endblock %}</span>
        <span class="topbar-status" id="topbar-status"></span>
        <div class="topbar-controls">
          <button id="theme-toggle" class="topbar-btn" title="Toggle light/dark mode" aria-label="Toggle theme">
            <span id="theme-icon">&#9728;</span>
            <span id="theme-label">Light</span>
          </button>
          <button id="mascot-toggle" class="topbar-btn" title="Toggle LRN Man on/off" aria-label="Toggle LRN Man">
            <span>&#128737;</span>
            <span id="mascot-label">Guide: ON</span>
          </button>
        </div>
      </div>
      <div class="content">
        {% block content %}{% endblock %}
      </div>
    </main>

  </div>

  <!-- LRN Man Mascot -->
  <div id="lrn-man-container" class="lrn-man-container">
    <div id="lrn-bubble" class="lrn-bubble" aria-live="polite">
      <button class="lrn-dismiss" id="lrn-dismiss" title="Dismiss" aria-label="Dismiss tip">&#215;</button>
      <p id="lrn-tip-text" class="lrn-tip-text"></p>
      <div class="lrn-bubble-footer">
        <button class="lrn-next-btn" id="lrn-next">Next tip &#8594;</button>
      </div>
    </div>
    <img id="lrn-man-img"
         src="{{ url_for('static', filename='img/lrn-man.png') }}"
         class="lrn-man-img"
         alt="LRN Man"
         title="Click me for tips!">
  </div>

  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
